name: Auto-Generate Release Notes

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  generate-release-notes:
    name: Generate and Post Release Notes to Confluence
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    env:
      ATLASSIAN_USERNAME: ${{ secrets.ATLASSIAN_USERNAME }}
      ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Batch PR Information
        id: batch-info
        env:
          PR_LINK: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Get commits from main..HEAD of the merged PR
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          bash scripts/extract-jira-info.sh "$BASE_SHA" "$HEAD_SHA" > extracted_info.md

          # Generate the HTML body and page header title
          bash scripts/generate-release-html.sh

      - name: Post to Confluence via API
        env:
          ATLASSIAN_USERNAME: ${{ secrets.ATLASSIAN_USERNAME }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          YEAR: ${{ steps.batch-info.outputs.year }}
          MONTH: ${{ steps.batch-info.outputs.month }}
          PAGE_TITLE: ${{ steps.batch-info.outputs.page_title }}
          REPO_ID: "1475641416"
        run: |
          bash scripts/post-to-confluence.sh
