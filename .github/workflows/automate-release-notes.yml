name: Auto-Generate Release Notes (Promote PR)

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  generate-release-notes:
    name: Generate and Post Release Notes to Confluence
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract and Generate Release HTML
        id: batch-info
        run: |
          # 1. Extract Jira IDs from git history
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          echo "Using range: $BASE_SHA..$HEAD_SHA"
          bash scripts/extract-jira-info.sh "$BASE_SHA" "$HEAD_SHA" > extracted_info.md

          # 2. Process extracted info to generate Confluence HTML and metadata
          bash scripts/generate-release-html.sh \
            "${{ github.event.pull_request.html_url }}" \
            "${{ github.event.pull_request.title }}" \
            "${{ github.event.pull_request.head.ref }}" \
            extracted_info.md

      - name: Post to Confluence
        env:
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_USERNAME: ${{ secrets.CONFLUENCE_USERNAME }}
          CONFLUENCE_TOKEN: ${{ secrets.CONFLUENCE_TOKEN }}
        run: |
          # 3. Use modular script to post/update Confluence
          bash scripts/post-to-confluence.sh \
            "Payments" \
            "${{ steps.batch-info.outputs.year }}" \
            "${{ steps.batch-info.outputs.month }}" \
            "${{ steps.batch-info.outputs.page_title }}" \
            confluence_body.html \
            "1475641416"


